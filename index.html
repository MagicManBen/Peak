<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Peak Wildlife Park Photo Map</title>
    <meta
      name="description"
      content="GPS-pinned photo map from a Peak Wildlife Park site walk."
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQPDbrvlgpYVfUu7Ff2Mw+Cd0RZ2qv8="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="map-page">
      <div id="map" aria-label="GPS-pinned photo map"></div>
      <div class="map-bar" aria-label="Map controls">
        <strong>Peak Wildlife Park Photo Map</strong>
        <span id="photo-count">Loading photos...</span>
        <button id="fit-map" type="button">Fit pins</button>
      </div>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="data/photos.js"></script>
    <script src="data/observations.js"></script>
    <script src="app.js"></script>
  </body>
</html>
